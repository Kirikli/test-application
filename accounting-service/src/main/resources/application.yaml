server:
  port: 8084

spring:
  application:
    name: accounting-service

  datasource:
    url: jdbc:postgresql://localhost:5434/payment
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  kafka:
    topics:
      task: task-stream-topic
      user-stream: user-stream-topic
      payment: payment-flow-topic
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      properties:
        enable-idempotence: true
        delivery.timeout.ms: 20000
        linger.ms: 0
        request.timeout.ms: 10000
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      auto-offset-reset: earliest
      group-id: accounting-event
      isolation-level: read_committed
      properties:
        spring.json.trusted.packages: asyncapi.event
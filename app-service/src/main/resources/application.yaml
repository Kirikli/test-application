spring:
  application:
    name: test-application

  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  kafka:
    topics:
      assign-executor: assign-executor-event-topic
      create-task: task-created-event-topic
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      properties:
        delivery.timeout.ms: 20000
        linger.ms: 0
        request.timeout.ms: 10000
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      auto-offset-reset: earliest
      group-id: task-event
      properties:
        spring.json.trusted.packages: asyncapi.event


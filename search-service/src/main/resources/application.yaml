server:
  port: 8085

spring:
  application:
    name: search-service

  datasource:
    url: jdbc:postgresql://localhost:5435/search
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  kafka:
    topics:
      user: user-stream-topic
      task: task-stream-topic
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      properties:
        enable-idempotence: true
        delivery.timeout.ms: 20000
        linger.ms: 0
        request.timeout.ms: 10000
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      auto-offset-reset: earliest
      group-id: search-event
      properties:
        spring.json.trusted.packages: asyncapi.event
